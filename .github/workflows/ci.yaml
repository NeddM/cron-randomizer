name: CI

on:
    push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
            node-version-file: package.json
            cache: npm
      - name: Install npm dependencies
        shell: bash
        run: npm test
